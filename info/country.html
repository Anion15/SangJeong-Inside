<script>
    async function checkCountryAndReload() {
        try {
            const response = await fetch('https://ipapi.co/json/');
            const data = await response.json();

            if (data.country === 'KR') {
                console.log("대한민국 접속 확인! 메인 페이지로 이동합니다.");
                window.location.href = 'https://commu.world/?nocache=' + new Date().getTime();
            }
        } catch (error) {
            console.error("IP 확인 중 오류 발생:", error);
        }
    }

    setInterval(checkCountryAndReload, 2000);
</script>
